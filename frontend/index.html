<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>库存监控</title>
    <style>
      /* Instant paint before JS bundles parse — reduces white-screen feel on Docker. */
      html, body {
        margin: 0;
        min-height: 100%;
        background: #0f172a;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      #app:empty {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      #app:empty::after {
        content: "加载中…";
        font-size: 14px;
        letter-spacing: 0.08em;
        opacity: 0.72;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
