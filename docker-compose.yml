services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5711:5711"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    entrypoint: ["sh", "/app/entrypoint.sh"]
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./static/uploads:/app/static/uploads
      - ./scripts:/app/scripts
      - ./frontend/dist:/app/frontend/dist
    restart: unless-stopped
