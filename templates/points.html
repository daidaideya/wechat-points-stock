{% extends "base.html" %}

{% block title %}用户列表 - 积分监控系统{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">用户列表</h2>

    <div class="accordion" id="pointsAccordion">
        {% for item in data %}
        <div class="accordion-item" id="account-card-{{ item.account.wechat_id }}">
            <h2 class="accordion-header" id="heading{{ loop.index }}">
                <button class="accordion-button {% if not loop.first %}collapsed{% endif %}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse{{ loop.index }}" aria-expanded="{{ 'true' if loop.first else 'false' }}" aria-controls="collapse{{ loop.index }}">
                    <strong>{{ item.account.nickname or item.account.wechat_id }}</strong> 
                    <small class="text-muted ms-3">设备：{{ item.account.device or '未设置' }}，手机号：{{ item.account.phone or '未设置' }}</small>
                    <span class="badge bg-secondary ms-2">{{ item.active_program_count }} 个小程序</span>
                </button>
            </h2>
            <div id="collapse{{ loop.index }}" class="accordion-collapse collapse" aria-labelledby="heading{{ loop.index }}" data-bs-parent="#pointsAccordion" data-wechat-id="{{ item.account.wechat_id }}">
                <div class="accordion-body">
                    <div class="table-responsive">
                        <table class="table table-sm table-hover">
                            <thead>
                                <tr>
                                    <th>小程序名称</th>
                                    <th>当前积分</th>
                                    <th>日变动</th>
                                    <th class="d-none d-md-table-cell">最后更新时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-{{ item.account.wechat_id }}" class="points-tbody">
                                <tr><td colspan="5" class="text-center text-muted">正在加载数据...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <div class="alert alert-info">暂无微信号数据</div>
        {% endfor %}
    </div>

    <!-- Modal for Program Ranking -->
    <div class="modal fade" id="rankingModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="rankingModalTitle">积分排行</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>排名</th>
                                    <th>用户昵称</th>
                                    <th class="d-none d-md-table-cell">Wechat ID</th>
                                    <th>当前积分</th>
                                    <th>更新时间</th>
                                </tr>
                            </thead>
                            <tbody id="rankingTableBody">
                                <tr><td colspan="5" class="text-center">加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let rankingModalInstance = null;

function showRankingModal(event, programId) {
    event.preventDefault();
    event.stopPropagation();
    
    if (!rankingModalInstance) {
        rankingModalInstance = new bootstrap.Modal(document.getElementById('rankingModal'));
    }
    
    const titleEl = document.getElementById('rankingModalTitle');
    const tbody = document.getElementById('rankingTableBody');
    
    titleEl.textContent = '加载中...';
    tbody.innerHTML = '<tr><td colspan="5" class="text-center"><div class="spinner-border text-primary" role="status"></div></td></tr>';
    
    rankingModalInstance.show();
    
    fetch(`/api/v1/programs/${programId}/ranking`)
        .then(response => response.json())
        .then(data => {
            titleEl.textContent = `${data.program_name} - 积分排行`;
            renderRankingTable(data.ranking);
            
            // Initialize tooltips inside modal
            var tooltipTriggerList = [].slice.call(document.querySelectorAll('#rankingTableBody [data-bs-toggle="tooltip"]'))
            var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl)
            });
        })
        .catch(error => {
            console.error('Error loading ranking:', error);
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">加载失败</td></tr>';
        });
}

function renderRankingTable(items) {
    const tbody = document.getElementById('rankingTableBody');
    
    if (!items || items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center">暂无数据</td></tr>';
        return;
    }
    
    tbody.innerHTML = items.map((item, index) => {
        const rank = index + 1;
        let rankBadge = '';
        if (rank === 1) rankBadge = '<span class="badge bg-warning text-dark"><i class="bi bi-trophy-fill"></i> 1</span>';
        else if (rank === 2) rankBadge = '<span class="badge bg-secondary"><i class="bi bi-trophy-fill"></i> 2</span>';
        else if (rank === 3) rankBadge = '<span class="badge bg-danger"><i class="bi bi-trophy-fill"></i> 3</span>';
        else rankBadge = `<span class="badge bg-light text-dark border">${rank}</span>`;
        
        const pointsBadge = item.points === 0 
            ? '<span class="badge bg-secondary">未注册</span>' 
            : `<span class="fw-bold text-primary">${item.points}</span>`;
            
        return `
            <tr>
                <td>${rankBadge}</td>
                <td>
                    <span data-bs-toggle="tooltip" data-bs-html="true" title="设备: ${item.device || '未设置'}<br>手机号: ${item.phone || '未设置'}" style="cursor: help;">
                        ${item.nickname || '未设置'}
                    </span>
                </td>
                <td class="d-none d-md-table-cell">${item.wechat_id}</td>
                <td>${pointsBadge}</td>
                <td class="text-muted small">${item.report_time || '-'}</td>
            </tr>
        `;
    }).join('');
}

document.addEventListener('DOMContentLoaded', function () {
    var accordionElement = document.getElementById('pointsAccordion');
    
    // Listen for accordion expand event
    accordionElement.addEventListener('show.bs.collapse', function (e) {
        var target = e.target; // The .collapse element
        var wechatId = target.getAttribute('data-wechat-id');
        if (!wechatId) return;
        
        var tbody = document.getElementById('tbody-' + wechatId);
        if (!tbody || tbody.getAttribute('data-loaded') === 'true') return;

        // Fetch data
        fetch('/api/v1/accounts/' + wechatId + '/points_details')
            .then(response => response.json())
            .then(data => {
                tbody.innerHTML = '';
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center">暂无数据</td></tr>';
                } else {
                    data.forEach(point => {
                        var pointsHtml = '';
                        if (point.points === '未注册' || point.points === 0) {
                            pointsHtml = '<span class="badge bg-secondary rounded-pill">未注册</span>';
                        } else {
                            pointsHtml = '<span class="badge bg-primary rounded-pill">' + point.points + '</span>';
                        }
                        
                        var diffHtml = '';
                        if (point.diff > 0) {
                            diffHtml = '<span class="text-success fw-bold">+' + point.diff + '</span>';
                        } else if (point.diff < 0) {
                            diffHtml = '<span class="text-danger fw-bold">' + point.diff + '</span>';
                        } else {
                            diffHtml = '<span class="text-muted">0</span>';
                        }
                        
                        var actionHtml = '';
                        if (point.points !== '未注册' && point.points !== 0) {
                            // Escape strings for onclick
                            var safeName = (point.program_name || point.program_id).replace(/'/g, "\\'");
                            actionHtml = '<button class="btn btn-outline-danger btn-sm" onclick="deleteProgram(\'' + wechatId + '\', \'' + point.program_id + '\', \'' + safeName + '\')"><i class="bi bi-trash"></i></button>';
                        }
                        
                        var reportTime = point.report_time || '-';
                        var programName = point.program_name || point.program_id;
                        
                        var row = `
                        <tr id="program-row-${wechatId}-${point.program_id}">
                            <td><a href="#" onclick="showRankingModal(event, '${point.program_id}')" class="text-decoration-none">${programName}</a></td>
                            <td>${pointsHtml}</td>
                            <td>${diffHtml}</td>
                            <td class="d-none d-md-table-cell">${reportTime}</td>
                            <td>${actionHtml}</td>
                        </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                }
                tbody.setAttribute('data-loaded', 'true');
            })
            .catch(error => {
                console.error('Error fetching points:', error);
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-danger">加载失败</td></tr>';
            });
    });
});

function deleteProgram(wechatId, programId, programName) {
    if (confirm('确定要删除 "' + programName + '" 的积分记录吗？')) {
        fetch('/api/v1/accounts/' + wechatId + '/programs/' + programId, {
            method: 'DELETE'
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                // Remove the row from DOM
                const element = document.getElementById('program-row-' + wechatId + '-' + programId);
                if (element) {
                    element.remove();
                }
                alert('删除成功');
            } else {
                alert('删除失败');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('操作出错');
        });
    }
}
</script>
{% endblock %}
