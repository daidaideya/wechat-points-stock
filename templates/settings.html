{% extends "base.html" %}

{% block title %}系统设置 - 积分监控系统{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4">系统设置</h2>
    <div class="card">
        <div class="card-header">
            日志配置
        </div>
        <div class="card-body">
            <form id="logSettingsForm" onsubmit="return false;">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">最大日志条数</label>
                        <input type="number" min="0" class="form-control" id="max_log_entries" value="{{ settings.max_log_entries }}">
                        <div class="form-text">保留的最新日志总数，0 表示不限制。</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">最大保留天数</label>
                        <input type="number" min="0" class="form-control" id="max_retention_days" value="{{ settings.max_retention_days }}">
                        <div class="form-text">超过该天数的历史记录将被清理，0 表示不限制。</div>
                    </div>
                </div>
                <div class="mt-4">
                    <button class="btn btn-primary" onclick="saveLogSettings()"><i class="bi bi-save"></i> 保存配置</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function saveLogSettings() {
    const maxEntries = parseInt(document.getElementById('max_log_entries').value || '0', 10);
    const maxDays = parseInt(document.getElementById('max_retention_days').value || '0', 10);
    fetch('/api/v1/settings/logs', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            max_log_entries: maxEntries,
            max_retention_days: maxDays
        })
    })
    .then(resp => resp.json())
    .then(data => {
        if (data.status === 'success') {
            alert('配置已保存并应用');
        } else {
            alert('保存失败');
        }
    })
    .catch(err => {
        console.error(err);
        alert('请求失败');
    });
}
</script>
{% endblock %}
