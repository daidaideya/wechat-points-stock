<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}积分监控系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .main-content {
            padding: 20px;
        }
        /* Desktop Sidebar */
        @media (min-width: 768px) {
            .sidebar {
                min-height: 100vh;
                background-color: #343a40;
                width: 250px;
                position: fixed;
                top: 0;
                left: 0;
                z-index: 100;
            }
            .sidebar a {
                color: #fff;
                text-decoration: none;
                padding: 10px 20px;
                display: block;
            }
            .sidebar a:hover {
                background-color: #495057;
            }
            .sidebar .active {
                background-color: #0d6efd;
            }
            .main-content {
                margin-left: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- Mobile Navbar -->
    <nav class="navbar navbar-dark bg-dark d-md-none sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">积分监控</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasSidebar" aria-controls="offcanvasSidebar">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <!-- Offcanvas Sidebar for Mobile -->
    <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="offcanvasSidebar" aria-labelledby="offcanvasSidebarLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasSidebarLabel">菜单</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="/" class="nav-link text-white {% if request.url.path == '/' %}active{% endif %}">
                        <i class="bi bi-grid-1x2 me-2"></i> 仪表盘
                    </a>
                </li>
                <li>
                    <a href="/points" class="nav-link text-white {% if request.url.path == '/points' %}active{% endif %}">
                        <i class="bi bi-list-ul me-2"></i> 用户列表
                    </a>
                </li>
                <li>
                    <a href="/programs" class="nav-link text-white {% if request.url.path.startswith('/programs') %}active{% endif %}">
                    <i class="bi bi-app-indicator me-2"></i> 小程序列表
                </a>
            </li>
            <li>
                <a href="/favorites" class="nav-link text-white {% if request.url.path == '/favorites' %}active{% endif %}">
                    <i class="bi bi-star me-2"></i> 收藏列表
                </a>
            </li>
            <li>
                    <a href="/stock" class="nav-link text-white {% if request.url.path == '/stock' %}active{% endif %}">
                        <i class="bi bi-box-seam me-2"></i> 库存管理
                    </a>
                </li>
                <li class="mt-auto"></li>
                <li>
                    <a href="/users" class="nav-link text-white {% if request.url.path == '/users' %}active{% endif %}">
                        <i class="bi bi-people me-2"></i> 用户管理
                    </a>
                </li>
                <li>
                    <a href="/settings" class="nav-link text-white {% if request.url.path == '/settings' %}active{% endif %}">
                        <i class="bi bi-gear me-2"></i> 系统设置
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Desktop Sidebar -->
    <div class="sidebar d-none d-md-flex flex-column p-3 text-white">
        <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
            <i class="bi bi-speedometer2 fs-4 me-2"></i>
            <span class="fs-4">积分监控</span>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                    <i class="bi bi-grid-1x2 me-2"></i> 仪表盘
                </a>
            </li>
            <li>
                <a href="/points" class="nav-link {% if request.url.path == '/points' %}active{% endif %}">
                    <i class="bi bi-list-ul me-2"></i> 用户列表
                </a>
            </li>
            <li>
                <a href="/programs" class="nav-link {% if request.url.path.startswith('/programs') %}active{% endif %}">
                    <i class="bi bi-app-indicator me-2"></i> 小程序列表
                </a>
            </li>
            <li>
                <a href="/favorites" class="nav-link {% if request.url.path == '/favorites' %}active{% endif %}">
                    <i class="bi bi-star me-2"></i> 收藏列表
                </a>
            </li>
            <li>
                <a href="/stock" class="nav-link {% if request.url.path == '/stock' %}active{% endif %}">
                    <i class="bi bi-box-seam me-2"></i> 库存管理
                </a>
            </li>
            <li class="mt-auto"></li>
            <li>
                <a href="/users" class="nav-link {% if request.url.path == '/users' %}active{% endif %}">
                    <i class="bi bi-people me-2"></i> 用户管理
                </a>
            </li>
            <li>
                <a href="/settings" class="nav-link {% if request.url.path == '/settings' %}active{% endif %}">
                    <i class="bi bi-gear me-2"></i> 系统设置
                </a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
